# This workflow runs all per-file checks (via prek) and the test suite for every push.
# prek.toml is the single source of truth for hook versions and per-file checks;
# this workflow orchestrates `prek run --all-files`, `just test`, and `just frontend-build`.

name: verify

on:
  push:
    branches-ignore: # avoid running on main
      - main # verify should run on the feat branch, in main only tested stuff should be merged, then release is triggered

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  # Required for svelte-kit sync / svelte-check ($env/static/public); value unused in CI.
  PUBLIC_API_URL: ""

jobs:
  run:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install the project (frozen)
        run: just install

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (frozen)
        run: just frontend-install

      - name: Run prek hooks
        uses: j178/prek-action@v1

      - name: Run tests
        run: just test

      - name: Build frontend
        run: just frontend-build
